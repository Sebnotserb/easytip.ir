<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="ایزی‌تیپ">
  <title>ایزی‌تیپ</title>
  <defs>
    <linearGradient id="etBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A8D4F"/>
      <stop offset="100%" stop-color="#6BCF9C"/>
    </linearGradient>
  </defs>

  <!-- Brand tile -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#etBg)"/>

  <!-- Bowl of ت (white) -->
  <path d="M 120 268 C 120 398, 392 398, 392 268"
        stroke="#FFFFFF" stroke-width="64"
        stroke-linecap="round" fill="none"/>

  <!-- Two dots above the bowl — amber, reading as gold tip coins -->
  <circle cx="200" cy="158" r="44" fill="#F59E0B"/>
  <circle cx="312" cy="158" r="44" fill="#F59E0B"/>
</svg>
